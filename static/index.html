<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner AI</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f0;
      --bg-tertiary: #f0efe8;
      --text: #1a1a1a;
      --text-secondary: #666660;
      --border: rgba(0,0,0,0.12);
      --border-secondary: rgba(0,0,0,0.22);
      --purple-light: #EEEDFE;
      --purple-mid: #AFA9EC;
      --purple: #534AB7;
      --purple-dark: #3C3489;
      --teal: #1D9E75;
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1e;
        --bg-secondary: #2a2a2a;
        --bg-tertiary: #252525;
        --text: #e8e8e8;
        --text-secondary: #999990;
        --border: rgba(255,255,255,0.10);
        --border-secondary: rgba(255,255,255,0.20);
        --purple-light: #26215C;
        --purple-mid: #534AB7;
        --purple: #AFA9EC;
        --purple-dark: #CECBF6;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }

    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 90vh;
      max-height: 720px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    /* Header */
    #header {
      padding: 14px 18px;
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
    }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .avatar i { font-size: 18px; color: var(--purple); }
    .header-info p { font-size: 14px; font-weight: 500; color: var(--text); }
    .header-info span { font-size: 12px; color: var(--text-secondary); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--teal); margin-left: auto;
    }

    /* Messages */
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px;
      background: var(--bg-tertiary);
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-secondary); border-radius: 2px; }

    .msg { display: flex; gap: 8px; max-width: 88%; }
    .msg.user { flex-direction: row-reverse; align-self: flex-end; }
    .msg.bot { align-self: flex-start; }

    .bot-icon {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--purple-light);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 2px;
    }
    .bot-icon i { font-size: 13px; color: var(--purple); }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px; line-height: 1.65;
    }
    .msg.bot .bubble {
      background: var(--bg);
      border: 0.5px solid var(--border);
      color: var(--text);
      border-top-left-radius: 4px;
    }
    .msg.user .bubble {
      background: var(--purple);
      color: #fff;
      border-top-right-radius: 4px;
    }

    /* Typing */
    .typing-dots { display: flex; gap: 4px; padding: 12px 14px; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-secondary);
      animation: blink 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* Quick reply chips */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .chip {
      padding: 5px 12px;
      border: 0.5px solid var(--border-secondary);
      border-radius: 20px;
      font-size: 12px; cursor: pointer;
      background: var(--bg-secondary);
      color: var(--text);
      transition: all 0.15s;
      font-family: inherit;
    }
    .chip:hover { background: var(--purple-light); border-color: var(--purple-mid); color: var(--purple-dark); }

    /* Schedule card */
    .schedule-card {
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: 10px;
      margin-top: 8px;
      overflow: hidden;
    }
    .card-title {
      padding: 8px 12px;
      font-size: 11px; font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 0.5px solid var(--border);
      text-transform: uppercase; letter-spacing: 0.05em;
    }
    .day-row {
      padding: 8px 12px;
      border-bottom: 0.5px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      gap: 8px;
    }
    .day-row:last-child { border-bottom: none; }
    .day-name { font-size: 12px; font-weight: 500; color: var(--text-secondary); min-width: 65px; }
    .day-topic { font-size: 12px; color: var(--text); flex: 1; }
    .time-badge {
      font-size: 11px; padding: 2px 8px;
      border-radius: 10px;
      background: var(--purple-light); color: var(--purple);
      white-space: nowrap;
    }
    .resource-row {
      padding: 8px 12px;
      border-bottom: 0.5px solid var(--border);
      display: flex; flex-direction: column; gap: 2px;
    }
    .resource-row:last-child { border-bottom: none; }
    .resource-row a {
      font-size: 12px; font-weight: 500;
      color: var(--purple); text-decoration: none;
    }
    .resource-row a:hover { text-decoration: underline; }
    .resource-row span { font-size: 11px; color: var(--text-secondary); }

    /* Input area */
    #input-area {
      padding: 12px 14px;
      border-top: 0.5px solid var(--border);
      background: var(--bg);
      display: flex; gap: 8px; align-items: flex-end;
    }
    #user-input {
      flex: 1; resize: none;
      border: 0.5px solid var(--border-secondary);
      border-radius: 20px;
      padding: 9px 14px;
      font-size: 14px; font-family: inherit;
      color: var(--text);
      background: var(--bg-secondary);
      outline: none; max-height: 100px; line-height: 1.5;
    }
    #user-input:focus { border-color: var(--purple-mid); }
    #user-input::placeholder { color: var(--text-secondary); }
    #send-btn {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--purple); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.15s;
    }
    #send-btn:hover { background: var(--purple-dark); }
    #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #send-btn i { font-size: 16px; color: #fff; }

    /* Responsive */
    @media (max-width: 480px) {
      body { padding: 0; }
      #app { height: 100vh; max-height: 100vh; border-radius: 0; }
    }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="avatar"><i class="ti ti-brain" aria-hidden="true"></i></div>
    <div class="header-info">
      <p>Study Planner AI</p>
      <span>Powered by Claude</span>
    </div>
    <div class="status-dot" title="Online"></div>
  </div>

  <div id="messages" role="log" aria-live="polite" aria-label="Chat messages"></div>

  <div id="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Type a message..."
      aria-label="Message input"
    ></textarea>
    <button id="send-btn" aria-label="Send message">
      <i class="ti ti-send" aria-hidden="true"></i>
    </button>
  </div>
</div>

<script>
// System prompt lives in server/index.js — not exposed to the client

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let history = [];
let isLoading = false;

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function createBotIcon() {
  const el = document.createElement('div');
  el.className = 'bot-icon';
  el.innerHTML = '<i class="ti ti-brain" aria-hidden="true"></i>';
  return el;
}

function parseAndRenderBotMessage(text) {
  const wrapper = document.createElement('div');
  wrapper.style.display = 'flex';
  wrapper.style.flexDirection = 'column';
  wrapper.style.gap = '8px';

  const hasSchedule = text.includes('SCHEDULE_START');
  const hasResources = text.includes('RESOURCES_START');

  let cleanText = text
    .replace(/SCHEDULE_START[\s\S]*?SCHEDULE_END/g, '')
    .replace(/RESOURCES_START[\s\S]*?RESOURCES_END/g, '')
    .trim();

  if (cleanText) {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = cleanText;
    wrapper.appendChild(bubble);
  }

  if (hasSchedule) {
    const match = text.match(/SCHEDULE_START([\s\S]*?)SCHEDULE_END/);
    if (match) {
      const card = document.createElement('div');
      card.className = 'schedule-card';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = 'Your weekly schedule';
      card.appendChild(title);

      match[1].trim().split('\n').filter(Boolean).forEach(row => {
        const parts = row.split('|').map(s => s.trim());
        if (parts.length >= 4) {
          const row = document.createElement('div');
          row.className = 'day-row';
          row.innerHTML = `
            <span class="day-name">${parts[1]}</span>
            <span class="day-topic">${parts[2]}</span>
            <span class="time-badge">${parts[3]}</span>
          `;
          card.appendChild(row);
        }
      });
      wrapper.appendChild(card);
    }
  }

  if (hasResources) {
    const match = text.match(/RESOURCES_START([\s\S]*?)RESOURCES_END/);
    if (match) {
      const card = document.createElement('div');
      card.className = 'schedule-card';
      const title = document.createElement('div');
      title.className = 'card-title';
      title.textContent = 'Recommended resources';
      card.appendChild(title);

      match[1].trim().split('\n').filter(Boolean).forEach(row => {
        const parts = row.split('|').map(s => s.trim());
        if (parts.length >= 2) {
          const el = document.createElement('div');
          el.className = 'resource-row';
          el.innerHTML = `
            <a href="${parts[1]}" target="_blank" rel="noopener noreferrer">${parts[0]}</a>
            <span>${parts[2] || ''}</span>
          `;
          card.appendChild(el);
        }
      });
      wrapper.appendChild(card);
    }
  }

  return wrapper;
}

function addMessage(role, text, chips = []) {
  const msgEl = document.createElement('div');
  msgEl.className = `msg ${role}`;

  if (role === 'bot') {
    msgEl.appendChild(createBotIcon());
    const inner = document.createElement('div');
    inner.style.display = 'flex';
    inner.style.flexDirection = 'column';

    const content = parseAndRenderBotMessage(text);
    inner.appendChild(content);

    if (chips.length) {
      const chipsEl = document.createElement('div');
      chipsEl.className = 'chips';
      chips.forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'chip';
        btn.textContent = label;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.chips').forEach(el => el.remove());
          inputEl.value = label;
          sendMessage();
        });
        chipsEl.appendChild(btn);
      });
      inner.appendChild(chipsEl);
    }

    msgEl.appendChild(inner);
  } else {
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    msgEl.appendChild(bubble);
  }

  messagesEl.appendChild(msgEl);
  scrollToBottom();
  return msgEl;
}

function showTyping() {
  const msgEl = document.createElement('div');
  msgEl.className = 'msg bot';
  msgEl.id = 'typing';
  msgEl.innerHTML = `
    <div class="bot-icon"><i class="ti ti-brain" aria-hidden="true"></i></div>
    <div class="bubble typing-dots"><span></span><span></span><span></span></div>
  `;
  messagesEl.appendChild(msgEl);
  scrollToBottom();
  return msgEl;
}



async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  addMessage('user', text);
  history.push({ role: 'user', content: text });

  const typing = showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    if (!res.ok) throw new Error(`Server error: ${res.status}`);
    const data = await res.json();
    const reply = data.reply || 'Sorry, something went wrong.';

    typing.remove();
    history.push({ role: 'assistant', content: reply });
    addMessage('bot', reply);
  } catch (err) {
    typing.remove();
    addMessage('bot', 'Oops! Could not connect to the server. Make sure the backend is running.');
    console.error(err);
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});
sendBtn.addEventListener('click', sendMessage);

// Initial greeting
addMessage('bot', "Hi! I'm your Study Planner AI. I'll help you build a personalised study schedule and find the best resources. What course or subject would you like to study?");
</script>
</body>
</html>
